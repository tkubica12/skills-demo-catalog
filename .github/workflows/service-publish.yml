name: Service — Build & Publish

# Builds the Task API Docker image and pushes it to GHCR.
# Triggered on every push to main (rolling :main tag + sha pin)
# and on semver tags (v*.*.* → :latest + :vX.Y.Z).

on:
  push:
    branches:
      - main
    paths:
      - "service/**"
      - ".github/workflows/service-publish.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/task-api

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main branch → :main
            type=ref,event=branch
            # PR → :pr-<number>
            type=ref,event=pr
            # semver tag v1.2.3 → :v1.2.3 and :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always pin to the git SHA (first 7 chars)
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: service
          file: service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
