name: CI Benchmark

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      TASK_API_BASE_URL: http://127.0.0.1:18080
      BENCHMARK_TOKEN_MODE: none

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run benchmark harness
        run: |
          # Token measurement (Copilot CLI vs SDK) is configurable via BENCHMARK_TOKEN_MODE.
          # Set it to 'cli' or 'sdk'. The default 'none' skips token counting.
          uv run python tests/mock_api_server.py &
          sleep 2
          uv run pytest tests/benchmark_bulk.py -v --tb=short
