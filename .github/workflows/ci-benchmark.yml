name: CI Benchmark

on:
  pull_request:
    paths:
      - ".github/workflows/ci-benchmark.yml"
      - ".github/agents/skill-maintainer.md"
      - ".github/copilot-instructions.md"
      - "benchmarks/**"
      - "pyproject.toml"
      - "skills/task-api-helper/**"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      model:
        description: Copilot model used for the agent benchmark
        required: false
        default: gpt-4.1
      spec:
        description: Relative path to the benchmark spec JSON to execute
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  agent-benchmark:
    runs-on: ubuntu-latest
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Resolve benchmark inputs
        id: benchmark-vars
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.base_ref }}" ]; then
            branch="${{ github.base_ref }}"
            ref="origin/${branch}"
          else
            branch="main"
            ref="origin/main"
          fi

          git fetch origin "$branch" --depth=1

          if [ -n "${{ inputs.model }}" ]; then
            model="${{ inputs.model }}"
          else
            model="gpt-4.1"
          fi

          spec="${{ inputs.spec }}"
          if [ -z "$spec" ] && [ -n "${{ github.base_ref }}" ]; then
            mapfile -t specs < <(git diff --name-only "origin/${branch}...HEAD" -- benchmarks/specs | grep -E '\.json$' || true)
            if [ "${#specs[@]}" -eq 1 ]; then
              spec="${specs[0]}"
            elif [ "${#specs[@]}" -gt 1 ]; then
              echo "::error::Expected exactly one benchmark spec change in the PR, found ${#specs[@]}."
              printf '%s\n' "${specs[@]}"
              exit 1
            fi
          fi

          if [ -z "$spec" ]; then
            mapfile -t specs < <(find benchmarks/specs -type f -name '*.json' | sort)
            if [ "${#specs[@]}" -eq 1 ]; then
              spec="${specs[0]}"
              echo "::notice::No PR-specific benchmark spec was changed; using the only catalog spec: $spec"
            elif [ "${#specs[@]}" -gt 1 ]; then
              echo "::error::No benchmark spec was selected and multiple specs exist. Add or update exactly one spec under benchmarks/specs/ in the PR, or pass workflow_dispatch input 'spec'."
              printf '%s\n' "${specs[@]}"
              exit 1
            fi
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "spec=$spec" >> "$GITHUB_OUTPUT"
          if [ -n "$spec" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when benchmark spec is absent
        if: steps.benchmark-vars.outputs.should_run != 'true'
        run: echo "::notice::Skipping agent benchmark because no benchmark spec file was selected for this run."

      - name: Skip when Copilot benchmark token is missing
        if: steps.benchmark-vars.outputs.should_run == 'true' && env.COPILOT_GITHUB_TOKEN == ''
        run: echo "::notice::Skipping agent benchmark because COPILOT_GITHUB_TOKEN is not configured."

      - name: Run agent benchmark
        if: steps.benchmark-vars.outputs.should_run == 'true' && env.COPILOT_GITHUB_TOKEN != ''
        run: |
          uv run python benchmarks/agent_benchmark.py \
            --spec "${{ steps.benchmark-vars.outputs.spec }}" \
            --baseline-ref "${{ steps.benchmark-vars.outputs.ref }}" \
            --model "${{ steps.benchmark-vars.outputs.model }}" \
            --output-json benchmark-report.json \
            --output-markdown benchmark-summary.md

      - name: Add benchmark summary
        if: steps.benchmark-vars.outputs.should_run == 'true' && env.COPILOT_GITHUB_TOKEN != '' && always()
        run: |
          if [ -f benchmark-summary.md ]; then
            cat benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark artifact
        if: steps.benchmark-vars.outputs.should_run == 'true' && env.COPILOT_GITHUB_TOKEN != '' && always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-benchmark-report
          path: |
            benchmark-report.json
            benchmark-summary.md

      - name: Publish benchmark PR comment
        if: github.event_name == 'pull_request' && steps.benchmark-vars.outputs.should_run == 'true' && env.COPILOT_GITHUB_TOKEN != '' && always()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.COPILOT_TOKEN || github.token }}
          script: |
            const fs = require("fs");
            const marker = "<!-- agent-benchmark-summary -->";
            const path = "benchmark-summary.md";
            if (!fs.existsSync(path)) {
              core.info("benchmark-summary.md not found; skipping PR comment.");
              return;
            }

            const summary = fs.readFileSync(path, "utf8").trim();
            const body = [
              marker,
              "## Agent benchmark",
              "",
              summary,
              "",
              `[Full benchmark run](${process.env.RUN_URL})`,
            ].join("\n");

            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated benchmark PR comment ${existing.id}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
            core.info("Created benchmark PR comment.");
