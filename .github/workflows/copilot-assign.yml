name: Auto-assign to Copilot

on:
  issues:
    types:
      - labeled

jobs:
  assign:
    if: github.event.label.name == 'task-api-enhancement'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      COPILOT_ASSIGNEE_LOGIN: Copilot

    steps:
      - name: Skip when token missing
        if: env.COPILOT_TOKEN == ''
        run: |
          echo "Skipping Copilot auto-assignment."
          echo "Add a COPILOT_TOKEN secret with assignees:write scope to enable this workflow."

      - name: Assign issue to Copilot coding agent
        if: env.COPILOT_TOKEN != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.COPILOT_TOKEN }}
          script: |
            // Assign the issue to the Copilot coding agent when the task-api-enhancement label is applied.
            // This requires a COPILOT_TOKEN secret with assignees:write scope.
            const login = process.env.COPILOT_ASSIGNEE_LOGIN || "Copilot";
            const assignableId = context.payload.issue.node_id;

            const lookup = await github.graphql(
              `query ($login: String!) {
                user(login: $login) {
                  id
                  login
                }
              }`,
              { login }
            );

            if (!lookup.user) {
              core.setFailed(`Could not resolve GitHub user '${login}' for assignment.`);
              return;
            }

            await github.graphql(
              `mutation ($assignableId: ID!, $assigneeIds: [ID!]!) {
                addAssigneesToAssignable(
                  input: {
                    assignableId: $assignableId
                    assigneeIds: $assigneeIds
                  }
                ) {
                  assignable {
                    ... on Issue {
                      number
                    }
                  }
                }
              }`,
              {
                assignableId,
                assigneeIds: [lookup.user.id],
              }
            );

            core.info(`Assigned issue #${context.issue.number} to ${lookup.user.login}.`);
