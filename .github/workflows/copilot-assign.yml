name: Auto-assign to Copilot

# Triggers when a maintainer adds the 'accepted' label to an issue, meaning the
# enhancement has been triaged and approved for implementation. This prevents
# auto-assignment of every filed issue before review.
on:
  issues:
    types:
      - labeled

jobs:
  assign:
    # Only run when the 'accepted' label is applied (post-triage approval).
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    env:
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
      # The GitHub login of the Copilot coding agent actor.
      COPILOT_ASSIGNEE_LOGIN: copilot-swe-agent

    steps:
      - name: Skip when PAT secret is absent
        if: env.COPILOT_TOKEN == ''
        run: |
          echo "::notice::Skipping Copilot auto-assignment: COPILOT_TOKEN secret is not configured."
          echo "To enable this step, add a COPILOT_TOKEN repository secret containing a personal"
          echo "access token (classic) with 'repo' scope belonging to an account with write access."
          echo "The Copilot coding agent must also be enabled for this organization and repository."

      - name: Assign issue to Copilot coding agent via GraphQL
        if: env.COPILOT_TOKEN != ''
        uses: actions/github-script@v7
        with:
          # Use the PAT rather than GITHUB_TOKEN because assigning to the Copilot
          # bot user requires a token with sufficient scope and, in preview, the
          # Copilot coding agent may only activate when assigned by a qualifying PAT.
          github-token: ${{ env.COPILOT_TOKEN }}
          script: |
            // Resolve the Copilot coding agent actor via suggestedActors, then assign the issue
            // using the preview mutation that starts the cloud-agent flow.
            //
            // Limitations (as of Copilot coding agent preview):
            //   - The COPILOT_TOKEN must be a classic PAT with 'repo' scope.
            //   - Copilot coding agent must be enabled for the organization.
            //   - The repository must be in the agent's allowed scope.
            //   - If the bot is not suggested for assignment the workflow fails loudly.
            const login = process.env.COPILOT_ASSIGNEE_LOGIN || "copilot-swe-agent";
            const assignableId = context.payload.issue.node_id;
            const targetRepositoryId = context.payload.repository.node_id;

            const lookup = await github.graphql(
              `query ($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 20) {
                    nodes {
                      __typename
                      ... on User { login id }
                      ... on Bot { login id }
                    }
                  }
                }
              }`,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
              }
            );

            const actor = lookup.repository.suggestedActors.nodes.find((node) => node.login === login);
            if (!actor) {
              core.setFailed(
                `Could not resolve assignable Copilot actor '${login}'. ` +
                `Verify the repository has Copilot coding agent enabled and the login is correct.`
              );
              return;
            }

            await github.graphql(
              `mutation ($assignableId: ID!, $actorIds: [ID!]!, $targetRepositoryId: ID!) {
                replaceActorsForAssignable(
                  input: {
                    assignableId: $assignableId
                    actorIds: $actorIds
                    agentAssignment: {
                      targetRepositoryId: $targetRepositoryId
                    }
                  }
                ) {
                  assignable {
                    ... on Issue {
                      number
                    }
                  }
                }
              }`,
              {
                assignableId,
                actorIds: [actor.id],
                targetRepositoryId,
              },
              {
                headers: {
                  "GraphQL-Features": "issues_copilot_assignment_api_support",
                },
              },
            );

            core.info(`Assigned issue #${context.issue.number} to ${actor.login}.`);
