name: Task API Enhancement
description: Propose an enhancement for the task-api-helper skill or its companion CLI.
title: "[Enhancement] task-api-helper: "
labels:
  - task-api-enhancement
  - needs-triage
body:
  - type: dropdown
    id: affected-command
    attributes:
      label: Affected area
      description: Which shared workflow, command, or behavior is affected?
      options:
        - list-tasks
        - get-task
        - add-comment
        - new-command
        - other
    validations:
      required: true

  - type: textarea
    id: painful-workflow
    attributes:
      label: Painful workflow
      description: Describe the current manual workaround and why it hurts.
      placeholder: |
        Today we list tasks with --status waiting-for-response, then loop over every
        result and call add-comment once per task. This adds several seconds to CI and
        is brittle when a single request fails mid-loop.
    validations:
      required: true

  - type: textarea
    id: local-experiment-summary
    attributes:
      label: Local proof-of-concept summary
      description: |
        What did you try locally before opening this issue?
        Include the exact command or retry behavior you tested, what changed, and what you observed.
        Do NOT paste forked code here — only the evidence and proposal.
      placeholder: |
        I tried a temporary local proof of concept in my repo before opening this issue.
        I changed the local behavior so repeated 429s were retried with a short delay.
        Tested command / workflow: add the same comment across waiting tasks.
        Observed result: fewer failures and less manual repetition.
    validations:
      required: true
 
  - type: textarea
    id: local-evidence
    attributes:
      label: Local evidence
      description: |
        Include whatever evidence you have from the local proof of concept:
        timing, retry counts, reduced failures, fewer manual steps, or clearer behavior.
      placeholder: |
        Before: repeated task updates often failed on 429 and required rerunning manually.
        After local trial: the workflow completed reliably after automatic retries.
        Evidence: 3 transient 429s handled successfully during the local PoC.
    validations:
      required: true

  - type: input
    id: proposed-change
    attributes:
      label: Proposed shared change — exact syntax or behavior
      description: Provide the exact command syntax, retry behavior, or workflow change you want standardized in the catalog.
      placeholder: "python task_cli.py bulk-add-comment --status waiting-for-response --comment \"Reminder: please respond\"" 
    validations:
      required: true

  - type: textarea
    id: why-local-first
    attributes:
      label: Why this should be changed centrally
      description: Explain why this belongs in the shared skill instead of remaining a repo-local workaround.
      placeholder: |
        This behavior will help every downstream repo using the shared skill.
        Keeping it local would duplicate logic and drift from the central workflow.
    validations:
      required: true
 
  - type: checkboxes
    id: restore-confirmation
    attributes:
      label: Baseline restoration confirmation
      options:
        - label: I confirm I tried a local proof of concept before opening this issue.
          required: true
        - label: I confirm the local changes were NOT committed to production and my local repo has been restored to the published baseline.
          required: true

  - type: input
    id: team-project
    attributes:
      label: Team / project
      description: Helps maintainers prioritize the request.
      placeholder: Platform Engineering / acme-payments
