name: Task API Enhancement
description: Propose an enhancement for the task-api-helper skill or its companion CLI.
title: "[Enhancement] task-api-helper: "
labels:
  - task-api-enhancement
  - needs-triage
body:
  - type: dropdown
    id: affected-command
    attributes:
      label: Affected CLI command
      description: Which command or area is affected?
      options:
        - list-tasks
        - get-task
        - add-comment
        - new-command
        - other
    validations:
      required: true

  - type: textarea
    id: painful-workflow
    attributes:
      label: Painful workflow
      description: Describe the current manual workaround and why it hurts.
      placeholder: |
        Today we list tasks with --status waiting-for-response, then loop over every
        result and call add-comment once per task. This adds several seconds to CI and
        is brittle when a single request fails mid-loop.
    validations:
      required: true

  - type: textarea
    id: local-experiment-summary
    attributes:
      label: Local experiment summary
      description: |
        What did you implement locally to prove the idea works?
        Include the exact command you tested, the API request shape, and the observed behavior.
        Do NOT include the forked code — only the evidence.
      placeholder: |
        I forked task_cli.py locally and added a bulk-add-comment command that sends
        a single POST /tasks/bulk-comment with {"task_ids": [...], "text": "..."}.
        Tested against the mock server and our staging API — all tasks updated in one call.
        Command tested: python task_cli.py bulk-add-comment --status waiting-for-response --comment "Reminder: please respond"
    validations:
      required: true

  - type: textarea
    id: benchmark-results
    attributes:
      label: Before/After benchmark results
      description: Include timing data from the local experiment, ideally from tests/benchmark_bulk.py.
      placeholder: |
        Baseline loop (add-comment per task): 1.20s for 10 tasks
        Simulated bulk call: 0.10s for 10 tasks
        Speedup: 12.00x
    validations:
      required: true

  - type: input
    id: proposed-command
    attributes:
      label: Proposed new CLI command — exact syntax
      description: Provide the exact command syntax you want standardized in the catalog.
      placeholder: "python task_cli.py bulk-add-comment --status waiting-for-response --comment \"Reminder: please respond\""
    validations:
      required: true

  - type: checkboxes
    id: restore-confirmation
    attributes:
      label: Baseline restoration confirmation
      options:
        - label: I confirm the local changes were NOT committed to production and my local fork has been restored to the published baseline.
          required: true

  - type: input
    id: team-project
    attributes:
      label: Team / project
      description: Helps maintainers prioritize the request.
      placeholder: Platform Engineering / acme-payments
